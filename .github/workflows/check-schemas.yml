name: Check Generated Schemas

permissions: {}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  check-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1 # sufficient for checking changes
          submodules: true
          persist-credentials: false

      - name: Setup Node.js
        uses: oxc-project/setup-node@4c26e7cb3605b6bdef5450dacd02c434b10fd8ba # v1.2.0

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install go-jsonschema
        run: go install github.com/atombender/go-jsonschema@v0.23.0

      - name: Generate JSON schemas
        run: node tools/gen-json-schemas.mjs

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated schema files don't match committed versions. Please run 'node tools/gen-json-schemas.mjs' and commit the changes."
            exit 1
          fi
          echo "✓ All generated schemas match committed versions"
